<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>The Fuzztones - Official Site</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                background-color: #000;
                color: #ccc;
                font-family: 'Arial', sans-serif;
                text-align: center;
            }

            header {
                padding: 50px 20px 20px;
            }

            img {
                max-width: 300px;
                height: auto;
            }

            h1 {
                color: #fff;
                font-size: 2.5em;
                letter-spacing: 2px;
                margin-top: 20px;
            }

            p {
                font-size: 1.1em;
                color: #bbb;
                margin: 20px auto;
                max-width: 600px;
                line-height: 1.6;
            }

            .links {
                margin-top: 30px;
            }

            .links a {
                color: #fff;
                text-decoration: none;
                border: 1px solid #555;
                padding: 10px 20px;
                margin: 10px;
                display: inline-block;
                transition: 0.3s;
            }

            .links a:hover {
                background-color: #222;
            }

            footer {
                margin-top: 60px;
                color: #666;
                font-size: 0.9em;
                padding-bottom: 30px;
            }
        </style>
    </head>

    <body>
        <header>
            <img src="assets/fuzztones-logo.jpg" alt="The Fuzztones Logo">
            <h1>The Fuzztones</h1>
            <p>Official website of the legendary garage rock band — raw fuzz, reverb, and attitude since 1980.</p>

            <p>More info and features coming soon</p>
            <p>In Fuzz We Trust!</p>
        </header>

        <div class="links">
            <a href="#">Tour Dates</a>
            <a href="#">Music</a>
            <a href="#">Merch</a>
            <a href="#">Contact</a>
        </div>

        <footer>
            © 2025 The Fuzztones. All rights reserved.
        </footer>
    </body>

</html>
